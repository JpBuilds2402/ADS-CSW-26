<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Contato - João Pedro</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="curriculo.html">Currículo</a></li>
          <li><a href="servicos.html">Serviços</a></li>
          <li><a href="contato.html">Contato</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <h1>Solicite um Orçamento</h1>
      <form action="#">
        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" name="nome" required />

        <label for="tel">Telefone:</label>
        <input type="tel" id="tel" name="tel" />

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" />

        <label>Pessoa Física ou Jurídica?</label>
        <select name="pessoa">
          <option value="fisica">Pessoa Física</option>
          <option value="juridica">Pessoa Jurídica</option>
        </select>

        <label>Melhor Horário para Contato:</label>
        <div class="radio-group">
          <input type="radio" name="horario" value="manha" /> Manhã
          <input type="radio" name="horario" value="tarde" /> Tarde
        </div>

        <label for="servico">Tipo de Serviço:</label>
        <select id="servico" name="servico">
          <option value="estatico">Site Estático</option>
          <option value="dinamico">Site Dinâmico</option>
          <option value="avancado">Avançado</option>
        </select>

        <label for="obs">Breve descrição do que deseja:</label>
        <textarea id="obs" name="obs" rows="4"></textarea>

        <button type="submit" class="btn-enviar">Enviar Proposta</button>
      </form>
    </main>
  </body>
</html>
